<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Yedi - AI Benchmark</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
        #unity-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #unity-canvas { width: 960px; height: 540px; background: #231942; }
        #loading-bar { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; }
        #loading-bar .fill { background: #e94560; height: 4px; transition: width 0.3s; }
        #status { position: absolute; bottom: 10px; left: 10px; color: #ccc; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>
    <div id="loading-bar"><div class="fill" id="loading-fill"></div></div>
    <div id="status">Loading...</div>

    <script>
        // Parse query parameters for agent configuration
        var params = new URLSearchParams(window.location.search);
        var agentMode = params.get('agent') === 'true';
        var wsUrl = params.get('ws') || ('ws://' + window.location.host + '/ws/game');

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
        var config = {
            dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
            frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
#if USE_WASM
            codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#endif
#if MEMORY_FILENAME
            memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
            symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
            streamingAssetsUrl: "StreamingAssets",
            companyName: "{{{ COMPANY_NAME }}}",
            productName: "{{{ PRODUCT_NAME }}}",
            productVersion: "{{{ PRODUCT_VERSION }}}",
        };

        var loadingFill = document.getElementById("loading-fill");
        var statusDiv = document.getElementById("status");

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = function() {
            createUnityInstance(document.querySelector("#unity-canvas"), config, function(progress) {
                loadingFill.style.width = (progress * 100) + "%";
                statusDiv.textContent = "Loading... " + Math.round(progress * 100) + "%";
            }).then(function(instance) {
                // Expose globally for AgentBridge.jslib
                window.unityInstance = instance;
                document.getElementById("loading-bar").style.display = "none";
                statusDiv.textContent = "Game loaded.";

                // Auto-connect to agent server if agent mode is enabled
                if (agentMode) {
                    statusDiv.textContent = "Connecting to agent server: " + wsUrl;
                    // Give Unity a moment to initialize, then connect
                    setTimeout(function() {
                        instance.SendMessage('AgentBridge', 'ConnectToServer', wsUrl);
                        statusDiv.textContent = "Agent mode active. WebSocket: " + wsUrl;
                    }, 2000);
                } else {
                    statusDiv.textContent = "Human play mode. Add ?agent=true to enable AI.";
                }

                // Page Visibility reporting. When the tab is hidden or
                // occluded, browsers throttle requestAnimationFrame to
                // ~1Hz and the Unity WebGL main loop slows to a crawl —
                // every agent command then takes >30s and trips the gym
                // server's per-command timeout. We can't prevent the
                // throttling, but we CAN tell the server it's happening
                // so the dashboard surfaces a warning before runs start
                // failing. Sent directly via the WebSocket (NOT through
                // unityInstance.SendMessage) so the message still goes
                // out even when the Unity main loop is paused.
                if (agentMode) {
                    var sendVisibility = function() {
                        var ws = window._agentWS;
                        if (!ws || ws.readyState !== 1) return;
                        try {
                            ws.send(JSON.stringify({
                                type: "visibility",
                                hidden: document.hidden === true,
                            }));
                        } catch (e) {
                            console.warn("[Yedi] visibility send failed:", e);
                        }
                    };
                    document.addEventListener("visibilitychange", sendVisibility);
                    // Also report on initial load so the dashboard reflects
                    // the current state without waiting for a transition.
                    setTimeout(sendVisibility, 2500);

                    // Anti-throttle keepalive: Chrome aggressively throttles
                    // requestAnimationFrame in hidden/background tabs (down
                    // to 1Hz or slower), which stalls Unity's main loop and
                    // causes command timeouts. A silent AudioContext with a
                    // running oscillator tricks Chrome into treating the tab
                    // as "actively producing audio", which exempts it from
                    // the aggressive rAF throttling. The oscillator runs at
                    // 0 gain so the user hears nothing.
                    try {
                        var AudioCtx = window.AudioContext || window.webkitAudioContext;
                        if (AudioCtx) {
                            var actx = new AudioCtx();
                            var osc = actx.createOscillator();
                            var gain = actx.createGain();
                            gain.gain.value = 0;         // silent
                            osc.connect(gain);
                            gain.connect(actx.destination);
                            osc.start();
                            // Chrome suspends AudioContext until a user
                            // gesture, but in agent/worker mode the page is
                            // opened programmatically with
                            // --autoplay-policy=no-user-gesture-required so
                            // it starts immediately. If not, resume on first
                            // visibility change as a fallback.
                            if (actx.state === 'suspended') {
                                document.addEventListener('visibilitychange', function() {
                                    actx.resume();
                                }, { once: true });
                            }
                            console.log('[Yedi] Anti-throttle AudioContext started');
                        }
                    } catch (e) {
                        console.warn('[Yedi] Anti-throttle AudioContext failed:', e);
                    }
                }
            }).catch(function(message) {
                statusDiv.textContent = "Error: " + message;
                console.error(message);
            });
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
